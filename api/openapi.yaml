openapi: 3.0.3
info:
  title: Rydex API
  version: "1.0.0"
  description: >
    Rydex ride-hailing and delivery dispatch platform — public API.
    Resource-oriented, versioned from day one (/v1/), with Idempotency-Key
    support on trip creation, cursor pagination on trip history, and
    RFC 7807 Problem Details for all errors.
    See docs/3-End-to-End-Delivery-Plan.md §1.5 for the brief this spec fulfills.

servers:
  - url: /v1

tags:
  - name: Trips
  - name: Drivers
  - name: Riders
  - name: Auth

paths:
  /trips:
    post:
      tags: [Trips]
      summary: Request a trip
      description: >
        Creates a Trip in Requested status and begins matching asynchronously.
        Maps to RequestTripCommand (Engineering Roadmap Tier 1.3) and the
        Request a trip acceptance criteria in requirements/traceability-matrix.md §3.
      operationId: requestTrip
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: >
            Client-generated key. A retried request with the same key never
            creates a second Trip (traceability-matrix.md §3; enforced by a
            unique constraint on Trip.IdempotencyKey, schema-v1.md §6).
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestTripBody'
      responses:
        '202':
          description: >
            Trip created in Requested status; matching is happening
            asynchronously (Engineering Roadmap Tier 2.5 — 202 Accepted for
            async operations). Match result is pushed via the real-time
            channel, not returned in this response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Problem'

  /trips/history:
    get:
      tags: [Trips]
      summary: Get paginated trip history for the authenticated Rider or Driver
      description: >
        Cursor-based pagination — never offset, since offset breaks when new
        trips are inserted (Engineering Roadmap Tier 2.5). Backed by the
        Dapper read path (ADR-002) and the covering index defined in
        schema-v1.md §4.
      operationId: getTripHistory
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor from a previous response's nextCursor field.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of trip history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripHistoryPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Problem'

  /trips/{tripId}:
    get:
      tags: [Trips]
      summary: Get trip details
      operationId: getTripDetails
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip detail, including embedded Fare and HATEOAS-light _links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          description: >
            Resource-based authorization failure — a Rider may only view
            their own trips (Engineering Roadmap Tier 2.4; resource-based,
            not just role-based, authorization).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'

  /trips/{tripId}/cancel:
    post:
      tags: [Trips]
      summary: Cancel a trip
      description: >
        Always captures a cancellation reason (traceability-matrix.md §3).
        Rejected if the Trip is already in a terminal state
        (domain/aggregates.md §2 — terminal-state immutability invariant).
      operationId: cancelTrip
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Required cancellation reason.
      responses:
        '200':
          description: Trip moved to Cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '409':
          description: >
            Trip is already in a terminal state — cancellation is not a
            legal transition from here (domain/glossary.md §3).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        default:
          $ref: '#/components/responses/Problem'

  /trips/{tripId}/accept:
    post:
      tags: [Trips]
      summary: Driver accepts an outstanding match offer
      description: >
        This is the action that transitions a Trip from Matched to
        DriverEnRoute (domain/glossary.md §4 — the precise Matched-vs-Accepted
        distinction). Protected against the double-booking race via
        optimistic concurrency on the Trip row (schema-v1.md §5).
      operationId: acceptTrip
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip transitioned to DriverEnRoute.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '409':
          description: >
            Concurrent acceptance race lost, or the offer is no longer valid
            (e.g. it already timed out and was re-offered to another Driver)
            — Engineering Roadmap Tier 2.5's named use of 409 for concurrent
            driver booking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        default:
          $ref: '#/components/responses/Problem'

  /trips/{tripId}/rating:
    post:
      tags: [Trips]
      summary: Submit a rating for a completed trip
      description: >
        Only permitted once Trip.Status = Completed
        (traceability-matrix.md §3 — Ratings & feedback).
      operationId: submitTripRating
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Rating recorded.
        '409':
          description: Trip is not yet Completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        default:
          $ref: '#/components/responses/Problem'

  /drivers:
    post:
      tags: [Drivers]
      summary: Driver onboarding
      description: >
        Creates a Driver in pending-verification onboarding status
        (traceability-matrix.md §2). Not eligible to go online until an
        Admin approves (Epic I — resolved as the same Identity-context
        operation per domain/bounded-contexts.md §3).
      operationId: onboardDriver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverOnboardingBody'
      responses:
        '201':
          description: Driver created, OnboardingStatus = Pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        default:
          $ref: '#/components/responses/Problem'

  /drivers/{driverId}:
    get:
      tags: [Drivers]
      summary: Get driver profile
      operationId: getDriver
      parameters:
        - $ref: '#/components/parameters/DriverId'
      responses:
        '200':
          description: Driver profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'

  /drivers/{driverId}/approve:
    post:
      tags: [Drivers]
      summary: Admin approves a driver's onboarding
      description: >
        Identity-context operation (domain/bounded-contexts.md §3 — resolves
        risk-register.md R-06). Restricted to the Admin role.
      operationId: approveDriver
      parameters:
        - $ref: '#/components/parameters/DriverId'
      responses:
        '200':
          description: Driver OnboardingStatus = Approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/Problem'

  /drivers/{driverId}/suspend:
    post:
      tags: [Drivers]
      summary: Admin suspends a driver
      description: >
        Driver becomes immediately ineligible for new matches; an
        in-progress trip is allowed to complete (traceability-matrix.md §10).
      operationId: suspendDriver
      parameters:
        - $ref: '#/components/parameters/DriverId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Driver SuspensionStatus = Suspended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/Problem'

  /riders:
    post:
      tags: [Riders]
      summary: Rider signup
      operationId: signupRider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderSignupBody'
      responses:
        '201':
          description: Rider account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rider'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        default:
          $ref: '#/components/responses/Problem'

  /riders/{riderId}:
    get:
      tags: [Riders]
      summary: Get rider profile
      operationId: getRider
      parameters:
        - $ref: '#/components/parameters/RiderId'
      responses:
        '200':
          description: Rider profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rider'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'

  /auth/login:
    post:
      tags: [Auth]
      summary: Email/phone-based login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                  description: Email or phone.
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authenticated; returns access + refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Problem'

components:
  parameters:
    TripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DriverId:
      name: driverId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RiderId:
      name: riderId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    RequestTripBody:
      type: object
      required: [pickup, destination]
      properties:
        pickup:
          $ref: '#/components/schemas/Coordinate'
        destination:
          $ref: '#/components/schemas/Coordinate'

    Coordinate:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      description: >
        WGS84 lat/lng pair — the Coordinate value object
        (domain/aggregates.md §5).

    Trip:
      type: object
      properties:
        tripId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Requested, Matched, DriverEnRoute, InProgress, Completed, Cancelled]
          description: TripStatus per domain/glossary.md §3.
        riderId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
          nullable: true
          description: Null until the Trip enters Matched.
        pickup:
          $ref: '#/components/schemas/Coordinate'
        destination:
          $ref: '#/components/schemas/Coordinate'
        fare:
          $ref: '#/components/schemas/Fare'
        requestedAt:
          type: string
          format: date-time
        _links:
          type: object
          description: >
            HATEOAS-light (Engineering Roadmap Tier 2.5) — which actions are
            currently valid given this Trip's status (e.g. cancel, rate).
          properties:
            cancel:
              type: string
              nullable: true
            rate:
              type: string
              nullable: true
            accept:
              type: string
              nullable: true

    Fare:
      type: object
      properties:
        baseFareAmount:
          type: number
        surgeMultiplier:
          type: number
        totalFareAmount:
          type: number
        currency:
          type: string
        paymentStatus:
          type: string
          enum: [Pending, Captured, Failed]

    TripHistoryPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Trip'
        nextCursor:
          type: string
          nullable: true
          description: Pass as ?cursor= on the next request; null if no more pages.

    Driver:
      type: object
      properties:
        driverId:
          type: string
          format: uuid
        onboardingStatus:
          type: string
          enum: [Pending, Approved, Rejected]
        suspensionStatus:
          type: string
          enum: [Active, Suspended]
        ratingSummary:
          type: object
          properties:
            average:
              type: number
            count:
              type: integer

    DriverOnboardingBody:
      type: object
      required: [email, vehicleInfo]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        vehicleInfo:
          type: object
        documentRefs:
          type: array
          items:
            type: string

    Rider:
      type: object
      properties:
        riderId:
          type: string
          format: uuid
        email:
          type: string
        accountStatus:
          type: string

    RiderSignupBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          format: password

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInSeconds:
          type: integer

    Problem:
      type: object
      description: >
        RFC 7807 Problem Details — the standardized error shape across every
        Rydex endpoint (Delivery Plan §1.5; Engineering Roadmap Tier 2.5).
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

  responses:
    Problem:
      description: An error occurred. RFC 7807 Problem Details shape.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationProblem:
      description: >
        422 Unprocessable Entity — semantic validation failure
        (Engineering Roadmap Tier 2.5).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: 401 — missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: >
        403 — authenticated, but not authorized for this resource
        (role-based or resource-based, Engineering Roadmap Tier 2.4).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: 404 — resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []